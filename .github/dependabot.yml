version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    groups:
      cloudflare:
        patterns:
          - "@cloudflare/*"
          - "wrangler"
          - "workers-ai-provider"
      ai-sdk:
        patterns:
          - "ai"
          - "agents"
      dev-tooling:
        patterns:
          - "eslint"
          - "@typescript-eslint/*"
          - "typescript-eslint"
          - "prettier"
          - "typescript"
          - "@types/*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
